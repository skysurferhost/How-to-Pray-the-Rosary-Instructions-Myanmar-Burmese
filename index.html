<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rosary PDF Viewer Myanmar Burmese</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
html, body {
margin:0;
padding:0;
height:100%;
background:#111;
overflow:hidden;
font-family:Arial,sans-serif;
}

.toolbar{
position:fixed;
top:0;
left:0;
right:0;
height:44px;
background:rgba(0,0,0,0.85);
display:flex;
align-items:center;
justify-content:center;
gap:10px;
z-index:1000;
}

.toolbar button{
background:#fff;
border:none;
padding:6px 12px;
font-size:14px;
border-radius:4px;
cursor:pointer;
}

#viewer-container{
position:absolute;
top:44px;
bottom:44px;
left:0;
right:0;
overflow:hidden;
touch-action:none;
}

#viewer{
position:absolute;
top:0;
left:0;
transform-origin:0 0;
cursor:grab;
will-change:transform;
transform:translateZ(0);
}

#viewer.dragging{cursor:grabbing;}

.page-shell{
position:absolute;
left:0;
width:100%;
display:flex;
justify-content:center;
}

.page-canvas{
background:#fff;
display:block;
}

.page-placeholder{
background:#fff;
opacity:0.10;
}

.page-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:44px;
background:rgba(0,0,0,0.85);
display:flex;
align-items:center;
justify-content:center;
gap:14px;
z-index:1000;
color:#fff;
font-size:14px;
}

.page-nav button{
background:#fff;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
}

@media(max-width:768px){
.toolbar,.page-nav{height:50px;}
#viewer-container{top:50px;bottom:50px;}
}
</style>
</head>

<body>

<div class="toolbar">
<button onclick="zoomOut()">−</button>
<button onclick="zoomIn()">+</button>
<button onclick="toggleFullscreen()">⤢ မျက်နှာပြင်အပြည့်</button>
</div>

<div id="viewer-container">
<div id="viewer"></div>
</div>

<div class="page-nav">
<button onclick="prevPage()">◀</button>
<span id="pageIndicator">Loading…</span>
<button onclick="nextPage()">▶</button>
</div>

<script>

const url='./How-to-Pray-the-Rosary-Instructions-Myanmar-Burmese.pdf';

let pdfDoc=null;
let totalPages=0;

let scale=window.innerWidth<768?0.22:0.30;
const MIN_SCALE=0.12;
const MAX_SCALE=4;

let x=0;
let y=0;

let rafPending=false;

const viewer=document.getElementById('viewer');
const container=document.getElementById('viewer-container');
const indicator=document.getElementById('pageIndicator');

const PAGE_GAP=24;
let stripWidth=0;
let stripHeight=0;
let pageRects=[];
let pageNodes=[];

const RENDER_AHEAD_PX=1200;
const UNLOAD_BEHIND_PX=2400;
const RENDER_SCALE_BASE=1.5;

let currentPage=1;
let renderTickScheduled=false;


/* -------------------------------
   BURMESE NUMBER CONVERSION
--------------------------------*/

function toBurmeseNumber(num){
const burmeseDigits=['၀','၁','၂','၃','၄','၅','၆','၇','၈','၉'];
return String(num).replace(/\d/g,d=>burmeseDigits[d]);
}


/* -------------------------------
   LOAD PDF
--------------------------------*/

pdfjsLib.getDocument(url).promise.then(async pdf=>{
pdfDoc=pdf;
totalPages=pdf.numPages;
await buildLazyLayout();
resetView();
updateIndicator();
scheduleRenderTick();
});


async function buildLazyLayout(){

viewer.innerHTML='';
pageRects=[];
pageNodes=[];

stripWidth=0;
stripHeight=0;

const viewports=[];

for(let i=1;i<=totalPages;i++){
const page=await pdfDoc.getPage(i);
const vp=page.getViewport({scale:1});
viewports.push(vp);
stripWidth=Math.max(stripWidth,Math.ceil(vp.width));
}

let yCursor=0;

for(let i=1;i<=totalPages;i++){

const vp=viewports[i-1];
const h=Math.ceil(vp.height);
const w=Math.ceil(vp.width);

pageRects.push({
page:i,
yTop:yCursor,
yBottom:yCursor+h,
width:w,
height:h
});

yCursor+=h+(i===totalPages?0:PAGE_GAP);
}

stripHeight=yCursor;

viewer.style.width=stripWidth+'px';
viewer.style.height=stripHeight+'px';

for(let i=1;i<=totalPages;i++){

const r=pageRects[i-1];

const shell=document.createElement('div');
shell.className='page-shell';
shell.style.top=r.yTop+'px';
shell.style.height=r.height+'px';

const ph=document.createElement('div');
ph.className='page-placeholder';
ph.style.width=r.width+'px';
ph.style.height=r.height+'px';

shell.appendChild(ph);
viewer.appendChild(shell);

pageNodes.push({
shell,
node:ph,
rendered:false,
rendering:false,
renderScale:0
});
}

}


function resetView(){
x=(container.clientWidth-stripWidth*scale)/2;
y=20;
applyTransform();
}


function applyTransform(){

if(rafPending)return;

rafPending=true;

requestAnimationFrame(()=>{
viewer.style.transform=`translate(${x}px,${y}px) scale(${scale})`;
rafPending=false;
updateIndicator();
scheduleRenderTick();
});

}


function clampScale(s){
return Math.min(Math.max(MIN_SCALE,s),MAX_SCALE);
}


function zoomAtPoint(delta,cx,cy){

const prev=scale;
scale=clampScale(scale+delta);

const dx=cx-x;
const dy=cy-y;

x-=dx*(scale/prev-1);
y-=dy*(scale/prev-1);

applyTransform();
}


function zoomIn(){
zoomAtPoint(0.15,container.clientWidth/2,container.clientHeight/2);
}

function zoomOut(){
zoomAtPoint(-0.15,container.clientWidth/2,container.clientHeight/2);
}

function toggleFullscreen(){
if(!document.fullscreenElement)document.documentElement.requestFullscreen();
else document.exitFullscreen();
}


/* -------------------------------
   PAGE INDICATOR (BURMESE)
--------------------------------*/

function updateIndicator(){

const viewCenterY=(container.clientHeight/2-y)/scale;

let best=1;

for(const r of pageRects){

if(viewCenterY>=r.yTop && viewCenterY<=r.yBottom){
best=r.page;
break;
}

if(viewCenterY>r.yBottom)best=r.page;
}

currentPage=best;

indicator.textContent=
`စာမျက်နှာ ${toBurmeseNumber(currentPage)} / ${toBurmeseNumber(totalPages)}`;
}


function scrollToPage(n){

const r=pageRects.find(p=>p.page===n);
if(!r)return;

y=20-r.yTop*scale;
applyTransform();
}

function nextPage(){
if(currentPage<totalPages)scrollToPage(currentPage+1);
}

function prevPage(){
if(currentPage>1)scrollToPage(currentPage-1);
}


/* -------------------------------
   RENDER ENGINE
--------------------------------*/

function scheduleRenderTick(){
if(renderTickScheduled)return;

renderTickScheduled=true;

requestAnimationFrame(()=>{
renderTickScheduled=false;
renderVisiblePages();
});
}


function renderVisiblePages(){

if(!pdfDoc)return;

const topPdfY=(0-y)/scale;
const bottomPdfY=(container.clientHeight-y)/scale;

const aheadPdf=RENDER_AHEAD_PX/scale;
const unloadPdf=UNLOAD_BEHIND_PX/scale;

const wantTop=topPdfY-aheadPdf;
const wantBottom=bottomPdfY+aheadPdf;

const unloadTop=topPdfY-unloadPdf;
const unloadBottom=bottomPdfY+unloadPdf;

const desiredRenderScale=
Math.min(3.0,Math.max(1.0,RENDER_SCALE_BASE*scale*1.2));

for(let i=0;i<pageRects.length;i++){

const r=pageRects[i];
const node=pageNodes[i];

const intersectsWanted=!(r.yBottom<wantTop || r.yTop>wantBottom);
const outsideUnload=(r.yBottom<unloadTop || r.yTop>unloadBottom);

if(intersectsWanted){

if(!node.rendering && (!node.rendered || node.renderScale<desiredRenderScale-0.25)){
renderPageIntoNode(i,desiredRenderScale);
}

}else if(outsideUnload){

if(node.rendered && !node.rendering){
unloadPageNode(i);
}

}

}

}


async function renderPageIntoNode(index,renderScale){

const r=pageRects[index];
const node=pageNodes[index];

node.rendering=true;

try{

const page=await pdfDoc.getPage(r.page);
const vp=page.getViewport({scale:renderScale});

const canvas=document.createElement('canvas');

canvas.className='page-canvas';
canvas.width=Math.floor(vp.width);
canvas.height=Math.floor(vp.height);

canvas.style.width=r.width+'px';
canvas.style.height=r.height+'px';

const ctx=canvas.getContext('2d',{alpha:false});

await page.render({canvasContext:ctx,viewport:vp}).promise;

node.shell.innerHTML='';
node.shell.appendChild(canvas);

node.node=canvas;
node.rendered=true;
node.renderScale=renderScale;

}catch(e){

}else{

node.rendering=false;

}

}


function unloadPageNode(index){

const r=pageRects[index];
const node=pageNodes[index];

const ph=document.createElement('div');

ph.className='page-placeholder';
ph.style.width=r.width+'px';
ph.style.height=r.height+'px';

node.shell.innerHTML='';
node.shell.appendChild(ph);

node.node=ph;
node.rendered=false;
node.renderScale=0;

}


/* -------------------------------
   PAN / DRAG
--------------------------------*/

let dragging=false;
let startX,startY;

container.addEventListener('pointerdown',e=>{
dragging=true;
viewer.classList.add('dragging');
startX=e.clientX-x;
startY=e.clientY-y;
});

window.addEventListener('pointermove',e=>{
if(!dragging)return;
x=e.clientX-startX;
y=e.clientY-startY;
applyTransform();
});

window.addEventListener('pointerup',()=>{
dragging=false;
viewer.classList.remove('dragging');
});


/* -------------------------------
   WHEEL ZOOM
--------------------------------*/

container.addEventListener('wheel',e=>{
e.preventDefault();
const delta=e.deltaY<0?0.10:-0.10;
zoomAtPoint(delta,e.offsetX,e.offsetY);
},{passive:false});


/* -------------------------------
   EXPOSE BUTTON FUNCTIONS
--------------------------------*/

window.zoomIn=zoomIn;
window.zoomOut=zoomOut;
window.toggleFullscreen=toggleFullscreen;
window.nextPage=nextPage;
window.prevPage=prevPage;

</script>

</body>
</html>
